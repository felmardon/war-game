version: '3.8'

services:
  war-game:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ENVIRONMENT: dev
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
    volumes:
      - ./src/main/resources:/app/config:ro
    networks:
      - war-game-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  war-game-network:
    driver: bridge

